name: Run All Tests with Allure Report
permissions:
  contents: write
  pages: write
  id-token: write
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # возможность запустить вручную

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [common, api-tests, ui-tests, unit-tests, db-tests]
      fail-fast: false  # не останавливать другие модули при падении одного

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run ${{ matrix.module }} tests
        run: mvn clean test -pl ${{ matrix.module }}
        continue-on-error: true  # продолжаем, даже если модуль упал

      - name: Upload Allure results for ${{ matrix.module }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.module }}
          path: ${{ matrix.module }}/target/allure-results
          if-no-files-found: warn
          retention-days: 7

  allure-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          merge-multiple: true

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Install Allure
        run: |
          sudo apt-add-repository ppa:qameta/allure -y
          sudo apt-get update
          sudo apt-get install allure

      - name: Generate Allure Report
        run: |
          allure generate --clean -o allure-report allure-results

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: true