# GitHub Actions Workflow: Запуск всех тестов с Allure отчетом
# Цель: Автоматически запускать тесты при пуше/PR и публиковать Allure отчет
# Имя workflow, которое отображается в интерфейсе GitHub Actions
name: Run All Tests with Allure Report

# ПРАВА ДОСТУПА (Permissions)
permissions:
  contents: write      # Право на запись в репозиторий (для пуша отчета)
  pages: write         # Право на деплой на GitHub Pages
  id-token: write      # Право на создание токена для Pages

# ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ (Environment Variables)
env:
  # Форсируем использование Node.js 24 для всех JavaScript actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ТРИГГЕРЫ ЗАПУСКА (Triggers)
on:
  push:                 # Запуск при пуше в ветки main или master
    branches: [ main, master ]
  pull_request:         # Запуск при создании PR в main/master
    branches: [ main, master ]
  workflow_dispatch:    # возможность запустить вручную

# JOB: test - Запуск тестов по модулям
jobs:
  # Сначала собираем common (базовый модуль)
  build-common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and install common module
        run: mvn clean install -pl common -am -DskipTests

  # Потом запускаем тесты (после того как common установлен)
  test:
    needs: build-common
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [api-tests, ui-tests, unit-tests, db-tests]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Install Chrome for UI tests
        if: matrix.module == 'ui-tests'
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Run ${{ matrix.module }} tests
        run: mvn clean test -pl ${{ matrix.module }} -am
        env:
          HEADLESS: "true"   # Включаем headless для UI тестов
        continue-on-error: true
      - name: Upload Allure results for ${{ matrix.module }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.module }}
          path: ${{ matrix.module }}/target/allure-results
          if-no-files-found: ignore
          retention-days: 7

  # JOB: allure-report - Генерация и публикация Allure отчета
  allure-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          merge-multiple: true

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # ШАГ 4: Установка Allure командной строки
      - name: Install Allure
        run: |
          # Обновляем список пакетов
          sudo apt-get update
          # Устанавливаем wget для скачивания
          sudo apt-get install -y wget
          # Скачиваем Allure 2.24.0
          wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure_2.24.0-1_all.deb
          # Устанавливаем пакет
          sudo dpkg -i allure_2.24.0-1_all.deb
          # Устанавливаем зависимости, если нужно
          sudo apt-get install -f
          # Проверяем версию
          allure --version

      # ШАГ 5: Генерация Allure отчета
      - name: Generate Allure Report
        run: |
          # allure generate: генерирует HTML отчет
          # --clean: очищает старый отчет
          # -o allure-report: папка для отчета
          # allure-results: папка с результатами тестов
          allure generate --clean -o allure-report allure-results

      # ШАГ 6: Деплой отчета на GitHub Pages
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: true